# Alembic configuration file for olmo-eval-internal

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file to be detected
# as revisions in the versions/ directory
# sourceless = false

# Version location specification
# This defaults to alembic/versions.  When providing multiple version locations, separate them with commas
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# Output encoding used when revision files are written from script.py.mako
# output_encoding = utf-8

# Database URL placeholder - override with environment variable or command line
# Format: postgresql+psycopg://user:password@host:port/database
sqlalchemy.url = postgresql+psycopg://postgres:postgres@localhost:5432/olmo_eval


[post_write_hooks]
# Post-write hooks are run on newly generated revision scripts
# Example: formatter = black -q %%(path)s

# Linter hook (optional - uncomment to enable)
# linter.type = exec
# linter.executable = %(here)s/.venv/bin/ruff
# linter.options = check --fix REVISION_SCRIPT_FILENAME


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
