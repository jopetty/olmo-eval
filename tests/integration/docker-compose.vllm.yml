version: "3.8"

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: olmo-eval-vllm-test
    ports:
      - "8000:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    # Use a tiny model for testing - Qwen2-0.5B is ~1GB
    command: >
      --model Qwen/Qwen2-0.5B
      --max-model-len 512
      --gpu-memory-utilization 0.5
      --dtype half
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: "no"

  # CPU-only version for environments without GPU
  vllm-cpu:
    image: vllm/vllm-cpu:latest
    container_name: olmo-eval-vllm-test-cpu
    ports:
      - "8001:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    command: >
      --model Qwen/Qwen2-0.5B
      --max-model-len 256
      --dtype float32
    profiles:
      - cpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 300s
    restart: "no"
